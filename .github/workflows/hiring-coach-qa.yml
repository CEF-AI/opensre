# hiring-coach QA — scheduled agent-QA on every new manifest release.
#
# Self-contained in this repo: the eval/watcher (Node) lives in ./qa-agent, OpenSRE (Python) is
# the repo itself. OpenSRE runs as a CLI (no exposed gateway).
#
# Flow (one job):
#   1. ./qa-agent/manifest-watch.ts (Node): if the QA vault's connection is behind the published
#      version, upgrade it, run the eval clips, and EMIT one alert per finished run to alerts.jsonl.
#      Stateless (--no-state): the vault connection version is the state, so each version is QA'd
#      exactly once. Nothing new -> alerts.jsonl stays empty.
#   2. `opensre investigate --input-json <alert>` per emitted alert. OpenSRE resolves cef/grafana +
#      the reporting channel from env, investigates (execution mode), and delivers.
#
# Reporting: Telegram for now; add Slack by setting SLACK_* secrets (from Martin) — no code change.
#
# Required repo secrets:
#   CEF_WALLET_B64          base64 of the QA wallet.json
#   CEF_WALLET_PASSWORD     wallet password
#   CEF_VAULT_ID, CEF_AGENT_ID, CEF_AGENT_SERVICE_PUBKEY
#   GRAFANA_READ_TOKEN
#   TELEGRAM_BOT_TOKEN, TELEGRAM_DEFAULT_CHAT_ID     (until Slack lands)
#   # later: SLACK_BOT_TOKEN, SLACK_DEFAULT_CHANNEL

name: hiring-coach QA

on:
  schedule:
    - cron: "0 6,18 * * *" # twice a day — 06:00 & 18:00 UTC; force-QAs so uptime gets 2 samples/day
  workflow_dispatch:
    inputs:
      force:
        description: "QA the current version even if no new manifest was published (always produces a report)"
        type: boolean
        default: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # QA every agent connected to the QA vault (one job per alias, in parallel).
    strategy:
      fail-fast: false
      matrix:
        alias: [hiring-coach-lab2, hiring-coach-qa]
    concurrency:
      group: hiring-coach-qa-${{ matrix.alias }}
      cancel-in-progress: false # never cancel an in-flight QA run for this alias
    env:
      # --- non-secret CEF config ---
      VAULT_URL: https://vault-api.compute.test.ddcdragon.com
      CEF_VAULT_BASE_URL: https://vault-api.compute.test.ddcdragon.com
      MARKETPLACE_URL: https://agent-marketplace.compute.test.ddcdragon.com
      GAR_URL: https://gar.compute.test.ddcdragon.com/api/v1
      GRAFANA_INSTANCE_URL: https://dashboards.cere.io
      HIRING_AGENT_ALIAS: ${{ matrix.alias }}
      CEF_CLUSTER: dragon1-testnet
      LLM_PROVIDER: ddcdragon # OSS model only
      # --- secrets ---
      CEF_VAULT_ID: ${{ secrets.CEF_VAULT_ID }}
      # Composed from the shared agent-service pubkey + this job's alias, so each matrix job QAs its
      # own connection (the CEF_AGENT_ID secret is no longer read directly).
      CEF_AGENT_ID: ${{ secrets.CEF_AGENT_SERVICE_PUBKEY }}:${{ matrix.alias }}
      CEF_AGENT_SERVICE_PUBKEY: ${{ secrets.CEF_AGENT_SERVICE_PUBKEY }}
      CEF_WALLET_PASSWORD: ${{ secrets.CEF_WALLET_PASSWORD }}
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}
      # SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}          # enable when Martin provides them
      # SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # --- Node toolchain for the eval / watcher (./qa-agent) ---
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: qa-agent/pnpm-lock.yaml
      - name: Install eval deps
        run: pnpm install --frozen-lockfile
        working-directory: qa-agent

      # --- Python toolchain for OpenSRE ---
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install OpenSRE
        run: uv sync --frozen --extra dev

      - name: Write QA wallet
        # Export CEF_WALLET_PATH to the job env so BOTH later steps — the eval AND the OpenSRE
        # investigate step — can reach the CEF vault. Without it in the investigate step,
        # cef_agent_logs is unavailable and QA sees only component/Loki logs (not the run's own
        # activities). ${{ runner.temp }} is not allowed in job-level env, so we set it here.
        run: |
          printf '%s' "${{ secrets.CEF_WALLET_B64 }}" | base64 -d > "$RUNNER_TEMP/wallet.json"
          echo "CEF_WALLET_PATH=$RUNNER_TEMP/wallet.json" >> "$GITHUB_ENV"

      - name: Detect new release, upgrade QA vault, run eval (emit alerts)
        env:
          QA_EMIT_FILE: ${{ github.workspace }}/alerts.jsonl
        run: |
          set -euo pipefail
          : > "$QA_EMIT_FILE"   # start empty
          # Force-QA (re-QA the current version even if unchanged) on BOTH the twice-daily schedule
          # and manual dispatch, so every run produces a report + a fresh uptime sample. Only a manual
          # dispatch with force=false stays version-gated (QA only a newly published version).
          FORCE_FLAG="--force"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" != "true" ]; then
            FORCE_FLAG=""
          fi
          echo "force flag: ${FORCE_FLAG:-<none>}"
          pnpm exec tsx manifest-watch.ts \
            --apply --no-state $FORCE_FLAG \
            --wallet "$CEF_WALLET_PATH" --password "$CEF_WALLET_PASSWORD" \
            --clips HIA-C1  # single clip = one e2e execution run per version (QA is execution, not scoring)
          echo "emitted $(wc -l < "$QA_EMIT_FILE" | tr -d ' ') alert(s)"
        working-directory: qa-agent

      - name: QA each finished run via OpenSRE CLI
        # OpenSRE investigates + delivers Telegram/Slack itself. The Notion dashboard is a SEPARATE
        # concern, so after each investigate we run the qa-agent's notion-push (best-effort: a Notion
        # hiccup logs but never fails the QA job).
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_READINESS_DB: ${{ secrets.NOTION_READINESS_DB }}
          NOTION_AUDIT_DB: ${{ secrets.NOTION_AUDIT_DB }}
        run: |
          set -euo pipefail
          ALERTS="${{ github.workspace }}/alerts.jsonl"
          if [ ! -s "$ALERTS" ]; then echo "No new release this cycle — nothing to QA."; exit 0; fi
          RESULT="${{ github.workspace }}/qa-result.json"
          TRIGGER=manual; [ "${{ github.event_name }}" = "schedule" ] && TRIGGER=scheduled
          while IFS= read -r alert; do
            [ -z "$alert" ] && continue
            echo "→ investigating $(printf '%s' "$alert" | uv run python -c 'import sys,json;print(json.load(sys.stdin)["commonAnnotations"]["conversation_id"])')"
            uv run opensre investigate --input-json "$alert" --output "$RESULT"
            # Mirror the verdict + RCA into the Notion readiness dashboard (separate step, not OpenSRE).
            pnpm -C qa-agent exec tsx notion-push.ts \
              --result "$RESULT" --alert "$alert" --dimension Functional --trigger "$TRIGGER" || true
          done < "$ALERTS"

  # UX dimension — Midscene/Playwright tests of the deployed hiring-coach widget, IN PARALLEL to the
  # Functional `qa` job (same cron + manual triggers). Scope for now: T1/T2 (up to "analyse audio").
  ux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VAULT_URL: https://vault.compute.test.ddcdragon.com/
      MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
      MIDSCENE_MODEL_BASE_URL: https://openrouter.ai/api/v1
      MIDSCENE_MODEL_NAME: qwen/qwen3-vl-235b-a22b-instruct
      MIDSCENE_MODEL_FAMILY: qwen3-vl
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_READINESS_DB: ${{ secrets.NOTION_READINESS_DB }}
      NOTION_AUDIT_DB: ${{ secrets.NOTION_AUDIT_DB }}
      UX_AGENT: hiring-coach-lab2 # matrix row the UX cell updates (the deployed hiring-coach widget)
    steps:
      - name: Checkout the QA feature branch (midscene-qa lives here)
        uses: actions/checkout@v4
        with:
          ref: feat/cef-qa-vault-client

      # pnpm 9 (Node-20 compatible) for the qa-agent notion-push; latest pnpm needs Node 22+.
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install midscene-qa deps
        working-directory: midscene-qa
        run: npm install --no-audit --no-fund

      - name: Install Chrome + system deps
        working-directory: midscene-qa
        run: npx playwright install --with-deps chrome

      - name: Install xvfb (virtual display for headed Chrome)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install qa-agent deps (for notion-push)
        run: pnpm -C qa-agent install --frozen-lockfile

      - name: Run UX suite (T1/T2) under xvfb
        working-directory: midscene-qa
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: ux-pw.json
        # Never fail the step on test failures — the JSON captures the real result and the push
        # reflects it. (A crash still yields no_go via build-ux-result.mjs.)
        run: |
          set +e
          xvfb-run -a npx playwright test ./e2e/hiring-coach.spec.ts --project=chrome --headed --reporter=list,html,json
          echo "playwright exit: $?"
          set -e

      - name: Build UX result JSON
        working-directory: midscene-qa
        run: node scripts/build-ux-result.mjs ux-pw.json ux-result.json

      - name: Push UX result to Notion (UX matrix cell + audit-trail row)
        env:
          TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          pnpm -C qa-agent exec tsx notion-push.ts \
            --dimension UX --agent "$UX_AGENT" \
            --result "${{ github.workspace }}/midscene-qa/ux-result.json" \
            --conversation-id "ux-${{ github.run_id }}" \
            --report-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --trigger "$TRIGGER" --source CI || true

      - name: Upload UX report (HTML report + trace + result)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-report
          path: |
            midscene-qa/playwright-report
            midscene-qa/ux-result.json
            midscene-qa/test-results
          if-no-files-found: ignore
