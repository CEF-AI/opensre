# hiring-coach QA — scheduled agent-QA on every new manifest release.
#
# NOTE: this workflow lives on the default branch (so GitHub registers the schedule + manual
# dispatch) but runs the CODE from the feat/cef-qa-vault-client branch (pinned in the checkout
# step below). The CEF QA feature is NOT merged into main — main has since been refactored to a
# different layout — so we run the branch's self-contained code. When the feature is eventually
# ported to main's structure, drop the `ref:` line.
#
# Flow (one job, OpenSRE run as a CLI — no exposed gateway):
#   1. ./qa-agent/manifest-watch.ts (Node): if the QA vault's connection is behind the published
#      version, upgrade it, run the eval clips, and EMIT one alert per finished run to alerts.jsonl.
#      Stateless (--no-state). Nothing new -> alerts.jsonl stays empty.
#   2. `opensre investigate --input-json <alert>` per emitted alert (resolves cef/grafana + the
#      reporting channel from env, investigates in execution mode, delivers).
#
# Reporting: Telegram for now; add Slack by setting SLACK_* secrets — no code change.
#
# Required repo secrets: CEF_WALLET_B64, CEF_WALLET_PASSWORD, CEF_VAULT_ID, CEF_AGENT_ID,
#   CEF_AGENT_SERVICE_PUBKEY, GRAFANA_READ_TOKEN, TELEGRAM_BOT_TOKEN, TELEGRAM_DEFAULT_CHAT_ID
#   # later: SLACK_BOT_TOKEN, SLACK_DEFAULT_CHANNEL

name: hiring-coach QA

on:
  schedule:
    - cron: "0 6,18 * * *" # twice a day — 06:00 & 18:00 UTC; force-QAs so uptime gets 2 samples/day
  workflow_dispatch:
    inputs:
      force:
        description: "QA the current version even if no new manifest was published (always produces a report)"
        type: boolean
        default: true
      prs:
        description: "Deploy-triggered QA: comma/space-separated merged PR links deployed to Stage. When set, the run posts a deploy-QA summary + these PRs to Slack."
        type: string
        default: ""
      component:
        description: "Deploy-triggered QA: what was deployed (e.g. deploy-inference-gateway) — shown in the Slack summary."
        type: string
        default: ""
      slack_thread_ts:
        description: "Slack thread ts to reply the deploy-QA summary into (set by the Slack poller)."
        type: string
        default: ""
  # Reusable entry so the Slack poller (qa-slack-poller.yml) can run QA token-free via `uses:`
  # (GITHUB_TOKEN can't start a workflow_dispatch, but a workflow_call is not an event dispatch).
  workflow_call:
    inputs:
      force:
        type: boolean
        default: true
      prs:
        type: string
        default: ""
      component:
        type: string
        default: ""
      slack_thread_ts:
        type: string
        default: ""
      slack_channel:
        type: string
        default: ""

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # QA every agent connected to the QA vault (one job per alias, in parallel).
    strategy:
      fail-fast: false
      matrix:
        alias: [hiring-coach-lab2] # hiring-coach-qa not published under the new AS (34bba26b…)
    concurrency:
      group: hiring-coach-qa-${{ matrix.alias }}
      cancel-in-progress: false # never cancel an in-flight QA run for this alias
    env:
      VAULT_URL: https://vault-api.compute.test.ddcdragon.com
      CEF_VAULT_BASE_URL: https://vault-api.compute.test.ddcdragon.com
      MARKETPLACE_URL: https://agent-marketplace.compute.test.ddcdragon.com
      GAR_URL: https://gar.compute.test.ddcdragon.com/api/v1
      GRAFANA_INSTANCE_URL: https://dashboards.cere.io
      HIRING_AGENT_ALIAS: ${{ matrix.alias }}
      CEF_CLUSTER: dragon1-testnet
      LLM_PROVIDER: ddcdragon # OSS model only
      CEF_VAULT_ID: ${{ secrets.CEF_VAULT_ID }}
      CEF_AGENT_ID: ${{ secrets.CEF_AGENT_SERVICE_PUBKEY }}:${{ matrix.alias }}
      CEF_AGENT_SERVICE_PUBKEY: ${{ secrets.CEF_AGENT_SERVICE_PUBKEY }}
      CEF_WALLET_PASSWORD: ${{ secrets.CEF_WALLET_PASSWORD }}
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }} # RCA → #manykind-agents-qa
    steps:
      - name: Checkout the QA feature branch (code runs from here, not main)
        uses: actions/checkout@v5
        with:
          ref: feat/cef-qa-vault-client

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: qa-agent/pnpm-lock.yaml
      - name: Install eval deps
        run: pnpm install --frozen-lockfile
        working-directory: qa-agent

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install OpenSRE
        run: uv sync --frozen --extra dev

      - name: Write QA wallet
        # Export CEF_WALLET_PATH into $GITHUB_ENV so BOTH the eval and the OpenSRE investigate
        # step can reach the CEF vault (else cef_agent_logs is unavailable and QA sees only
        # component logs, not the run's own activities). runner.temp is invalid in job env.
        run: |
          printf '%s' "${{ secrets.CEF_WALLET_B64 }}" | base64 -d > "$RUNNER_TEMP/wallet.json"
          echo "CEF_WALLET_PATH=$RUNNER_TEMP/wallet.json" >> "$GITHUB_ENV"

      - name: Detect new release, upgrade QA vault, run eval (emit alerts)
        env:
          QA_EMIT_FILE: ${{ github.workspace }}/alerts.jsonl
        run: |
          set -euo pipefail
          : > "$QA_EMIT_FILE"
          # Force-QA (re-QA the current version even if unchanged) on BOTH the twice-daily schedule
          # and manual dispatch, so every run produces a report + a fresh uptime sample. Only a manual
          # dispatch with force=false stays version-gated (QA only a newly published version).
          FORCE_FLAG="--force"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" != "true" ]; then
            FORCE_FLAG=""
          fi
          echo "force flag: ${FORCE_FLAG:-<none>}"
          pnpm exec tsx manifest-watch.ts \
            --apply --no-state $FORCE_FLAG \
            --wallet "$CEF_WALLET_PATH" --password "$CEF_WALLET_PASSWORD" \
            --clips HIA-C1  # single clip = one e2e execution run per version (QA is execution, not scoring)
          echo "emitted $(wc -l < "$QA_EMIT_FILE" | tr -d ' ') alert(s)"
        working-directory: qa-agent

      - name: QA each finished run via OpenSRE CLI
        # OpenSRE investigates + delivers Telegram/Slack itself. The Notion dashboard is a SEPARATE
        # concern, so after each investigate we run the qa-agent's notion-push (best-effort: a Notion
        # hiccup logs but never fails the QA job).
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_READINESS_DB: ${{ secrets.NOTION_READINESS_DB }}
          NOTION_AUDIT_DB: ${{ secrets.NOTION_AUDIT_DB }}
        run: |
          set -euo pipefail
          ALERTS="${{ github.workspace }}/alerts.jsonl"
          if [ ! -s "$ALERTS" ]; then echo "No new release this cycle — nothing to QA."; exit 0; fi
          RESULT="${{ github.workspace }}/qa-result.json"
          TRIGGER=manual; [ "${{ github.event_name }}" = "schedule" ] && TRIGGER=scheduled
          while IFS= read -r alert; do
            [ -z "$alert" ] && continue
            echo "→ investigating $(printf '%s' "$alert" | uv run python -c 'import sys,json;print(json.load(sys.stdin)["commonAnnotations"]["conversation_id"])')"
            uv run opensre investigate --input-json "$alert" --output "$RESULT"
            # Mirror the verdict + RCA into the Notion readiness dashboard (separate step, not OpenSRE).
            pnpm -C qa-agent exec tsx notion-push.ts \
              --result "$RESULT" --alert "$alert" --dimension Functional --trigger "$TRIGGER" || true
          done < "$ALERTS"

  # UX dimension — Midscene/Playwright tests of the deployed hiring-coach widget, IN PARALLEL to the
  # Functional `qa` job (same cron + manual triggers). Scope for now: T1/T2 (up to "analyse audio").
  ux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VAULT_URL: https://vault.compute.test.ddcdragon.com/
      MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
      MIDSCENE_MODEL_BASE_URL: https://openrouter.ai/api/v1
      MIDSCENE_MODEL_NAME: qwen/qwen3-vl-235b-a22b-instruct
      MIDSCENE_MODEL_FAMILY: qwen3-vl
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_READINESS_DB: ${{ secrets.NOTION_READINESS_DB }}
      NOTION_AUDIT_DB: ${{ secrets.NOTION_AUDIT_DB }}
      UX_AGENT: hiring-coach-lab2 # matrix row the UX cell updates (the deployed hiring-coach widget)
    steps:
      - name: Checkout the QA feature branch (midscene-qa lives here)
        uses: actions/checkout@v4
        with:
          ref: feat/cef-qa-vault-client

      # pnpm 9 (Node-20 compatible) for the qa-agent notion-push; latest pnpm needs Node 22+.
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install midscene-qa deps
        working-directory: midscene-qa
        run: npm install --no-audit --no-fund

      - name: Install Chrome + system deps
        working-directory: midscene-qa
        run: npx playwright install --with-deps chrome

      - name: Install xvfb (virtual display for headed Chrome)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install qa-agent deps (for notion-push)
        run: pnpm -C qa-agent install --frozen-lockfile

      - name: Run UX suite (T1/T2) under xvfb
        working-directory: midscene-qa
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: ux-pw.json
        # Never fail the step on test failures — the JSON captures the real result and the push
        # reflects it. (A crash still yields no_go via build-ux-result.mjs.)
        run: |
          set +e
          xvfb-run -a npx playwright test ./e2e/hiring-coach.spec.ts --project=chrome --headed --reporter=list,html,json
          echo "playwright exit: $?"
          set -e

      - name: Build UX result + collect screenshots
        working-directory: midscene-qa
        run: |
          node scripts/build-ux-result.mjs ux-pw.json ux-result.json
          # Collect all screenshots (widget states / failure shots) → comma list for inline embedding.
          # Paths have no spaces (Playwright slugifies), so a comma-join is safe for --attach.
          find test-results -name '*.png' 2>/dev/null | paste -sd, - > shots.txt
          echo "screenshots: $(cat shots.txt)"

      - name: Push UX result to Notion (UX cell + audit row; screenshots INLINE, no download)
        env:
          TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
          WS: ${{ github.workspace }}/midscene-qa
        run: |
          SHOTS=$(cat "$WS/shots.txt" 2>/dev/null || true)
          pnpm -C qa-agent exec tsx notion-push.ts \
            --dimension UX --agent "$UX_AGENT" \
            --result "$WS/ux-result.json" \
            --conversation-id "ux-${{ github.run_id }}" \
            --report-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            ${SHOTS:+--attach "$SHOTS"} \
            --trigger "$TRIGGER" --source CI || true

      - name: Upload UX report (HTML report + trace + result)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-report
          path: |
            midscene-qa/playwright-report
            midscene-qa/ux-result.json
            midscene-qa/test-results
          if-no-files-found: ignore
  # Quality dimension — the hiring-coach quality bar (16 clips → per-clip pass/fail → pass_ratio),
  # IN PARALLEL to Functional/UX. Pure eval numbers (no OpenSRE/QA-agent). The script lives in
  # qa-agent (transferred from agent-catalog PR #80, so no cross-repo checkout). Targets the eval AS
  # 5df19be7 (same QA-vault wallet as the Functional job).
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # 16 clips × ~1 min (more if cluster whisper is throttled)
    env:
      VAULT_URL: https://vault-api.compute.test.ddcdragon.com
      CEF_AGENT_SERVICE_PUBKEY: "0x34bba26b1b080fd381b4e84a4e74befd61653697dd0b610bf75ccbc3bd6c8760"
      HIRING_AGENT_ALIAS: hiring-coach-lab2
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_READINESS_DB: ${{ secrets.NOTION_READINESS_DB }}
      NOTION_AUDIT_DB: ${{ secrets.NOTION_AUDIT_DB }}
    steps:
      - name: Checkout the QA feature branch (qa-agent lives here)
        uses: actions/checkout@v4
        with:
          ref: feat/cef-qa-vault-client

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install qa-agent deps
        run: pnpm -C qa-agent install --frozen-lockfile

      - name: Write QA wallet
        run: printf '%s' "${{ secrets.CEF_WALLET_B64 }}" | base64 -d > "$RUNNER_TEMP/wallet.json"

      - name: Run the quality bar (16 clips) → row.json
        run: |
          pnpm -C qa-agent exec tsx quality-bar-run.ts \
            --wallet "$RUNNER_TEMP/wallet.json" --password "${{ secrets.CEF_WALLET_PASSWORD }}" \
            --out "${{ github.workspace }}/quality-row.json"

      - name: Push Quality result to Notion (Quality cell + audit row + delta)
        env:
          TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          pnpm -C qa-agent exec tsx quality-push.ts \
            --row "${{ github.workspace }}/quality-row.json" \
            --agent "$HIRING_AGENT_ALIAS" \
            --report-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --trigger "$TRIGGER" || true

      - name: Upload quality row
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-row
          path: quality-row.json
          if-no-files-found: ignore

  # Post-job: rebuild the per-agent "Last 10 runs" toggle + "Best today" line on each readiness page.
  # Runs ONCE after all three dimension jobs (needs) so it never races their parallel pushes, and with
  # `always()` so it still refreshes from whatever landed even if a dimension job failed. Code runs
  # from the feature branch (same ref pin as the other jobs).
  dashboard:
    needs: [qa, ux, quality]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_READINESS_DB: ${{ secrets.NOTION_READINESS_DB }}
      NOTION_AUDIT_DB: ${{ secrets.NOTION_AUDIT_DB }}
    steps:
      - name: Checkout the QA feature branch (qa-agent lives here)
        uses: actions/checkout@v4
        with:
          ref: feat/cef-qa-vault-client

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install qa-agent deps
        run: pnpm -C qa-agent install --frozen-lockfile

      - name: Rebuild the Last-10-runs toggle on each agent page
        run: |
          pnpm -C qa-agent exec tsx dashboard-toggle.ts \
            --agent hiring-coach-lab2 --agent hiring-coach-qa || true

  # Deploy-triggered QA summary: only when this run was fired with `prs` (i.e. a human ran the
  # workflow to QA a Stage deploy). Posts the per-dimension result + the deployed PR links to Slack.
  # `always()` so a failed dimension still reports; no correlation — just surfaces the PRs.
  deploy_summary:
    needs: [qa, ux, quality]
    if: ${{ always() && inputs.prs != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
    steps:
      - name: Post deploy-QA summary + deployed PRs to Slack
        env:
          FN: ${{ needs.qa.result }}
          UX: ${{ needs.ux.result }}
          QL: ${{ needs.quality.result }}
          PRS: ${{ inputs.prs }}
          COMPONENT: ${{ inputs.component }}
          THREAD_TS: ${{ inputs.slack_thread_ts }}
          # Post where the request came from (the poller passes the channel); fall back to the
          # default channel for manual/dispatch runs that don't originate in a Slack thread.
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          CHAN="${SLACK_CHANNEL:-}"; [ -z "$CHAN" ] && CHAN="${SLACK_DEFAULT_CHANNEL:-}"
          if [ -z "${SLACK_BOT_TOKEN:-}" ] || [ -z "$CHAN" ]; then
            echo "Slack not configured — skipping summary."; exit 0
          fi
          em() { case "$1" in success) echo "🟢 pass";; failure) echo "🔴 fail";; skipped) echo "⚪ skipped";; *) echo "⚪ $1";; esac; }
          OVERALL="🟢 PASS"
          if [ "$FN" = "failure" ] || [ "$UX" = "failure" ] || [ "$QL" = "failure" ]; then OVERALL="🔴 FAIL"; fi
          BULLETS=$(printf '%s' "$PRS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;/^$/d;s/^/• /')
          HEAD="🧪 *Deploy QA ${OVERALL}*"; [ -n "${COMPONENT:-}" ] && HEAD="${HEAD} — ${COMPONENT}"
          TEXT=$(printf '%s\nFunctional: %s   ·   Quality: %s   ·   UX: %s\n<%s|QA run>\n\n*Deployed PRs:*\n%s' \
            "$HEAD" "$(em "$FN")" "$(em "$QL")" "$(em "$UX")" "$RUN_URL" "$BULLETS")
          # Reply in the request's thread when the poller passed slack_thread_ts; else post top-level.
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg ch "$CHAN" --arg t "$TEXT" --arg tts "$THREAD_TS" \
              '{channel:$ch, text:$t} + (if $tts != "" then {thread_ts:$tts} else {} end)')" \
            | jq -r 'if .ok then "posted deploy-QA summary" else "slack error: " + (.error // "unknown") end'
